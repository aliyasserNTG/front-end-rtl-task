<section class="services-section" aria-labelledby="services-title">
    <div class="section-inner">
      <div class="section-header">
        <div>
          <h2 class="section-title" id="services-title">قسم الخدمات</h2>
          <p class="section-desc">هنا يمكنك إضافة وصف مختصر حول الغرض من البوابة متبوعاً بزر الحث على اتخاذ إجراء أو رسم توضيحي على الجانب الأيسر.</p>
        </div>
        <button class="btn-show-all" aria-label="عرض جميع الخدمات">عرض الكل</button>
      </div>
    </div>
    <div class="services-scroll" role="list" aria-label="قائمة الخدمات">
      @for (num of getIteration(20); track num) {
       <app-service-card-component [id]="num"/>
     }
    </div>
    <div class="carousel-nav" aria-label="تنقل الخدمات">
      <div class="carousel-dots">
        <div class="c-dot active" aria-label="صفحة 1"></div>
        <div class="c-dot" aria-label="صفحة 2"></div>
        <div class="c-dot" aria-label="صفحة 3"></div>
        <div class="c-dot" aria-label="صفحة 4"></div>
      </div>
      <div class="carousel-arrows">
        <button class="c-arrow" aria-label="السابق">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,4 6,8 10,12"/></svg>
        </button>
        <button class="c-arrow" aria-label="التالي">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,4 10,8 6,12"/></svg>
        </button>
      </div>
    </div>
  </section>
